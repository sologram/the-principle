# 第一定律：完备即正确
# 任何正确不允许任何遗漏

name: 完备即正确
theory: 任何正确不允许任何遗漏

positive_pairs:
  - [完备, 正确]
  - [确定, 客观]
  - [真理, 正确]
  - [边界, 有限]

opposite_pairs:
  - [完备, 不完备]
  - [正确, 错误]
  - [确定, 不确定]

# 语义轴
semantic_axes:
  价值轴:
    pos_words: [good, excellent, success, beneficial]
    neg_words: [bad, poor, failure, harmful]
  真值轴:
    pos_words: [right, correct, truth, affirm]
    neg_words: [wrong, incorrect, falsehood, deny]
  道德轴:
    pos_words: [good, kind, justice, moral]
    neg_words: [evil, wicked, injustice, immoral]

# 阈值
thresholds:
  positive_similarity: 0.5
  opposite_semantic: -0.3