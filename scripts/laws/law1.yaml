# 第一定律：完备即正确
# 任何正确不允许任何遗漏

name: 完备即正确
theory: 任何正确不允许任何遗漏

positive_pairs:
  - [完备, 正确]
  - [确定, 客观]
  - [真理, 正确]
  - [边界, 有限]

opposite_pairs:
  - [完备, 不完备]
  - [正确, 错误]
  - [确定, 不确定]

# 语用轴
pragmatic_axes:
  价值轴:
    pos_words: [好, 优秀, 成功, 有益]
    neg_words: [坏, 差, 失败, 有害]
  真值轴:
    pos_words: [对, 正确, 真实, 是]
    neg_words: [错, 错误, 虚假, 否]
  道德轴:
    pos_words: [善, 善良, 正义, 道德]
    neg_words: [恶, 邪恶, 不义, 不道德]

# 阈值
thresholds:
  positive_similarity: 0.5
  opposite_pragmatic: -0.3