# 第零定律：存在即信息
# 任何可以被识别、区分或描述的事物都是信息

name: 存在即信息
theory: 任何可以被识别、区分或描述的事物都是信息

positive_pairs:
  - [存在, 信息]
  - [实在, 真实]
  - [符号, 编码]
  - [物质, 信息]

opposite_pairs:
  - [真实, 虚假]
  - [存在, 虚无]
  - [物质, 意识]

# 语用轴（可用于此定律验证）
pragmatic_axes:
  价值轴:
    pos_words: [good, excellent, success, beneficial]
    neg_words: [bad, poor, failure, harmful]
  真值轴:
    pos_words: [right, correct, truth, affirm]
    neg_words: [wrong, incorrect, falsehood, deny]

# 阈值
thresholds:
  positive_similarity: 0.5
  opposite_pragmatic: -0.3