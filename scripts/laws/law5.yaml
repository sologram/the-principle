# 第五定律：意义即利益
# 意义是事物对主体的价值

name: 意义即利益
theory: 意义是事物对主体的价值

positive_pairs:
  - [意义, 利益]
  - [价值, 利益]
  - [幸福, 利益]
  - [目的, 目标]

opposite_pairs:
  - [意义, 无意义]
  - [利益, 损失]
  - [幸福, 痛苦]

# 语用轴
pragmatic_axes:
  价值轴:
    pos_words: [good, excellent, success, beneficial]
    neg_words: [bad, poor, failure, harmful]
  真值轴:
    pos_words: [right, correct, truth, affirm]
    neg_words: [wrong, incorrect, falsehood, deny]
  道德轴:
    pos_words: [good, kind, justice, moral]
    neg_words: [evil, wicked, injustice, immoral]
  美学轴:
    pos_words: [beautiful, pretty, elegant, harmonious]
    neg_words: [ugly, hideous, vulgar, chaotic]

# 阈值
thresholds:
  positive_similarity: 0.5
  opposite_pragmatic: -0.3