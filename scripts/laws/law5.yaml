# 第五定律：意义即利益
# 意义是事物对主体的价值

name: 意义即利益
theory: 意义是事物对主体的价值

positive_pairs:
  - [意义, 利益]
  - [价值, 利益]
  - [幸福, 利益]
  - [目的, 目标]

opposite_pairs:
  - [意义, 无意义]
  - [利益, 损失]
  - [幸福, 痛苦]

# 语用轴
pragmatic_axes:
  价值轴:
    pos_words: [好, 优秀, 成功, 有益]
    neg_words: [坏, 差, 失败, 有害]
  真值轴:
    pos_words: [对, 正确, 真实, 是]
    neg_words: [错, 错误, 虚假, 否]
  道德轴:
    pos_words: [善, 善良, 正义, 道德]
    neg_words: [恶, 邪恶, 不义, 不道德]
  美学轴:
    pos_words: [美, 漂亮, 优雅, 和谐]
    neg_words: [丑, 难看, 粗俗, 混乱]

# 阈值
thresholds:
  positive_similarity: 0.5
  opposite_pragmatic: -0.3