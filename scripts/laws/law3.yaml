# 第三定律：自由即无知
# 自由是无知的表现形式

name: 自由即无知
theory: 自由是无知的表现形式

positive_pairs:
  - [自由, 无知]
  - [放任, 混乱]
  - [熵, 自由]
  - [秩序, 知识]

opposite_pairs:
  - [自由, 奴役]
  - [无知, 知识]
  - [秩序, 混乱]

# 语义轴
semantic_axes:
  价值轴:
    pos_words: [好, 优秀, 成功, 有益]
    neg_words: [坏, 差, 失败, 有害]
  真值轴:
    pos_words: [对, 正确, 真实, 是]
    neg_words: [错, 错误, 虚假, 否]
  道德轴:
    pos_words: [善, 善良, 正义, 道德]
    neg_words: [恶, 邪恶, 不义, 不道德]

# 阈值
thresholds:
  positive_similarity: 0.5
  opposite_semantic: -0.3